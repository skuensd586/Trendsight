<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">PDF 简报导出流程图</title>
  <desc id="desc">展示前端点击导出后，由后端生成 PDF，前端以 Blob 下载文件的流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#355f8d"/>
    </marker>
    <style>
      .bg { fill: #f7fafc; }
      .title { font: 700 30px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #172033; }
      .sub { font: 400 14px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #607083; }
      .box { fill: #fff; stroke: #c7d5e5; stroke-width: 1.4; rx: 14; }
      .front { fill: #eaf2ff; stroke: #8eb3db; }
      .back { fill: #e7f5ee; stroke: #80ba9c; }
      .pdf { fill: #fff4e8; stroke: #d99f64; }
      .label { font: 700 17px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #1b2736; }
      .small { font: 400 13px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #526173; }
      .line { stroke: #355f8d; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 6 5; }
      .note { fill: #fff; stroke: #dbe5ee; rx: 12; }
      .note-text { font: 400 13px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #526173; }
      .note-title { font: 700 15px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #344e69; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="640"/>
  <text class="title" x="52" y="58">PDF 简报导出流程图</text>
  <text class="sub" x="52" y="84">导出从前端文本聚合调整为后端 PDF 生成，前端只负责触发、命名和下载。</text>

  <rect class="box front" x="74" y="180" width="190" height="76"/>
  <text class="label" x="118" y="211">点击导出</text>
  <text class="small" x="104" y="235">看板简报 / 事件简报</text>

  <rect class="box front" x="336" y="180" width="220" height="76"/>
  <text class="label" x="382" y="211">生成请求信息</text>
  <text class="small" x="366" y="235">时间戳、文件名、筛选参数</text>

  <rect class="box back" x="628" y="120" width="230" height="76"/>
  <text class="label" x="682" y="151">看板 PDF 接口</text>
  <text class="small" x="662" y="175">/brief/dashboard.pdf</text>

  <rect class="box back" x="628" y="260" width="230" height="76"/>
  <text class="label" x="682" y="291">事件 PDF 接口</text>
  <text class="small" x="672" y="315">/events/:id/brief.pdf</text>

  <rect class="box pdf" x="928" y="190" width="220" height="86"/>
  <text class="label" x="978" y="221">后端生成 PDF</text>
  <text class="small" x="962" y="245">brief_pdf_service.py</text>
  <text class="small" x="974" y="265">ReportLab 排版</text>

  <rect class="box front" x="326" y="410" width="230" height="78"/>
  <text class="label" x="378" y="441">返回 PDF Blob</text>
  <text class="small" x="364" y="465">downloadPdfFromBackend()</text>

  <rect class="box front" x="682" y="410" width="230" height="78"/>
  <text class="label" x="736" y="441">浏览器下载</text>
  <text class="small" x="720" y="465">临时链接触发文件保存</text>

  <path class="line" d="M264 218 H336"/>
  <path class="line" d="M556 205 C590 188 598 158 628 158"/>
  <path class="line" d="M556 230 C590 248 598 298 628 298"/>
  <path class="line" d="M858 158 C902 158 902 215 928 224"/>
  <path class="line" d="M858 298 C902 298 902 250 928 240"/>
  <path class="line" d="M1038 276 C1038 372 441 346 441 410"/>
  <path class="line" d="M556 449 H682"/>

  <rect class="note" x="96" y="540" width="1008" height="58"/>
  <text class="note-title" x="124" y="566">设计调整说明</text>
  <text class="note-text" x="228" y="566">前端直接生成 txt/PDF 会增加排版和性能压力；转到后端后，PDF 字体、表格、分页和数据聚合更稳定。</text>
  <text class="note-text" x="228" y="588">前端保留交互入口和下载能力，职责更清晰，后续也更容易扩展正式简报模板。</text>
</svg>
