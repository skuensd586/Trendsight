<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">前端重要数据结构关系图</title>
  <desc id="desc">展示 EventDetail 事件详情结构与情绪、趋势、平台、关键词、传播、问答、用户偏好等结构的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#345f8f"/>
    </marker>
    <style>
      .bg { fill: #f8fbfd; }
      .title { font: 700 30px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #172033; }
      .sub { font: 400 14px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #607083; }
      .box { fill: #fff; stroke: #c7d5e5; stroke-width: 1.4; rx: 14; }
      .core { fill: #e8f4ef; stroke: #76b498; stroke-width: 2; }
      .blue { fill: #eaf2ff; stroke: #8eb3db; }
      .orange { fill: #fff4e8; stroke: #d99f64; }
      .purple { fill: #f0edff; stroke: #aa9be1; }
      .gray { fill: #f3f6f9; stroke: #b9c6d4; }
      .label { font: 700 17px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #1b2736; }
      .field { font: 400 12.5px Consolas, "Microsoft YaHei", sans-serif; fill: #526173; }
      .line { stroke: #345f8f; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="780"/>
  <text class="title" x="52" y="58">前端重要数据结构关系图</text>
  <text class="sub" x="52" y="84">前端通过统一的事件对象承接接口数据，服务于看板、详情、图表、问答和导出。</text>

  <rect class="box core" x="450" y="284" width="300" height="178"/>
  <text class="label" x="548" y="316">EventDetail</text>
  <text class="field" x="482" y="346">id / title / category / time / location</text>
  <text class="field" x="482" y="369">summary / cause / people</text>
  <text class="field" x="482" y="392">heat / risk / stage / reportCount</text>
  <text class="field" x="482" y="415">falseConfidence / duplicateRate</text>
  <text class="field" x="482" y="438">advice / similarEvents / qaSeed</text>

  <rect class="box blue" x="70" y="136" width="260" height="116"/>
  <text class="label" x="134" y="168">EventSummary</text>
  <text class="field" x="100" y="198">看板列表使用</text>
  <text class="field" x="100" y="220">title / heat / risk / stage</text>
  <text class="field" x="100" y="242">sentiment / keywords</text>

  <rect class="box orange" x="470" y="122" width="260" height="108"/>
  <text class="label" x="550" y="154">Sentiment</text>
  <text class="field" x="512" y="184">positive / neutral / negative</text>
  <text class="field" x="512" y="206">情绪条、饼图、风险辅助判断</text>

  <rect class="box blue" x="870" y="136" width="260" height="116"/>
  <text class="label" x="946" y="168">TrendItem</text>
  <text class="field" x="900" y="198">time / value / node / predicted</text>
  <text class="field" x="900" y="220">趋势图、峰值、关键事件轴</text>

  <rect class="box gray" x="72" y="334" width="260" height="112"/>
  <text class="label" x="128" y="366">PlatformItem</text>
  <text class="field" x="102" y="396">name / value</text>
  <text class="field" x="102" y="418">平台分布横向柱状图</text>

  <rect class="box purple" x="870" y="334" width="260" height="112"/>
  <text class="label" x="938" y="366">WordItem</text>
  <text class="field" x="900" y="396">[word, weight]</text>
  <text class="field" x="900" y="418">词云、关键词图、问答上下文</text>

  <rect class="box orange" x="70" y="552" width="280" height="126"/>
  <text class="label" x="132" y="584">PropagationGraph</text>
  <text class="field" x="102" y="614">pathNodes: name/category/symbolSize</text>
  <text class="field" x="102" y="636">pathLinks: [source, target]</text>
  <text class="field" x="102" y="658">传播关系图和节点明细</text>

  <rect class="box purple" x="460" y="580" width="280" height="98"/>
  <text class="label" x="548" y="612">QAMessage</text>
  <text class="field" x="500" y="642">role: user / assistant</text>
  <text class="field" x="500" y="664">text: 问题或模型回答</text>

  <rect class="box gray" x="850" y="552" width="280" height="126"/>
  <text class="label" x="910" y="584">PreferenceSource</text>
  <text class="field" x="882" y="614">name / url / frequency / status</text>
  <text class="field" x="882" y="636">个人设置、监测源健康状态</text>
  <text class="field" x="882" y="658">保存时映射到后端偏好字段</text>

  <path class="line" d="M330 194 C392 210 432 260 480 302"/>
  <path class="line" d="M600 230 V284"/>
  <path class="line" d="M870 194 C808 210 768 260 720 302"/>
  <path class="line" d="M332 390 H450"/>
  <path class="line" d="M870 390 H750"/>
  <path class="line" d="M350 615 C410 574 455 515 500 462"/>
  <path class="line" d="M600 580 V462"/>
  <path class="line" d="M850 615 C790 574 745 515 700 462"/>
</svg>
