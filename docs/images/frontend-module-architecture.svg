<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Trendsight 前端模块结构图</title>
  <desc id="desc">展示 React 前端从入口、路由、页面、组件、API 适配到后端和 mock 数据的模块关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#315f8f"/>
    </marker>
    <style>
      .bg { fill: #f7fafc; }
      .title { font: 700 30px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #5d6878; }
      .layer-label { font: 700 16px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #35516e; }
      .box { fill: #ffffff; stroke: #c7d5e4; stroke-width: 1.4; rx: 12; }
      .box-blue { fill: #e9f2ff; stroke: #8db5df; }
      .box-green { fill: #e7f5ee; stroke: #87bfa7; }
      .box-orange { fill: #fff1e6; stroke: #dfaa72; }
      .box-purple { fill: #f0ecff; stroke: #a99be0; }
      .box-gray { fill: #f3f6f9; stroke: #c4ced8; }
      .text { font: 700 16px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #1c2635; }
      .small { font: 400 13px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #4d5b6b; }
      .tiny { font: 400 12px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #647286; }
      .line { stroke: #315f8f; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 6 5; }
      .band { fill: #ffffff; stroke: #e2e9f1; stroke-width: 1; rx: 18; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="52" y="58">Trendsight 前端模块结构图</text>
  <text class="subtitle" x="52" y="84">React + Vite 单页应用：页面负责业务交互，组件负责复用展示，API 层负责模式切换和字段适配。</text>

  <rect class="band" x="40" y="118" width="1120" height="86"/>
  <text class="layer-label" x="64" y="151">入口与路由层</text>
  <rect class="box box-blue" x="220" y="135" width="170" height="48"/>
  <text class="text" x="252" y="164">main.jsx</text>
  <rect class="box box-blue" x="468" y="135" width="170" height="48"/>
  <text class="text" x="513" y="164">App.jsx</text>
  <rect class="box box-blue" x="716" y="135" width="190" height="48"/>
  <text class="text" x="754" y="164">BrowserRouter</text>
  <path class="line" d="M390 159 H468"/>
  <path class="line" d="M638 159 H716"/>

  <rect class="band" x="40" y="232" width="1120" height="126"/>
  <text class="layer-label" x="64" y="265">页面层 pages</text>
  <rect class="box" x="160" y="274" width="128" height="50"/>
  <text class="text" x="184" y="304">首页</text>
  <text class="tiny" x="177" y="323">Landing</text>
  <rect class="box" x="306" y="274" width="128" height="50"/>
  <text class="text" x="341" y="304">认证</text>
  <text class="tiny" x="324" y="323">Login/Register</text>
  <rect class="box box-green" x="452" y="274" width="128" height="50"/>
  <text class="text" x="487" y="304">看板</text>
  <text class="tiny" x="474" y="323">Dashboard</text>
  <rect class="box box-green" x="598" y="274" width="128" height="50"/>
  <text class="text" x="629" y="304">详情</text>
  <text class="tiny" x="620" y="323">EventDetail</text>
  <rect class="box box-purple" x="744" y="274" width="128" height="50"/>
  <text class="text" x="775" y="304">问答</text>
  <text class="tiny" x="789" y="323">QA</text>
  <rect class="box" x="890" y="274" width="128" height="50"/>
  <text class="text" x="921" y="304">设置</text>
  <text class="tiny" x="929" y="323">Profile</text>
  <path class="line" d="M553 183 V232"/>
  <path class="line" d="M553 232 C553 250 224 250 224 274"/>
  <path class="line" d="M553 232 C553 250 370 250 370 274"/>
  <path class="line" d="M553 232 C553 250 516 250 516 274"/>
  <path class="line" d="M553 232 C553 250 662 250 662 274"/>
  <path class="line" d="M553 232 C553 250 808 250 808 274"/>
  <path class="line" d="M553 232 C553 250 954 250 954 274"/>

  <rect class="band" x="40" y="386" width="1120" height="124"/>
  <text class="layer-label" x="64" y="419">通用组件层 components</text>
  <rect class="box box-gray" x="150" y="433" width="145" height="50"/>
  <text class="text" x="187" y="462">AppShell</text>
  <text class="tiny" x="177" y="480">顶部导航/框架</text>
  <rect class="box box-gray" x="315" y="433" width="145" height="50"/>
  <text class="text" x="354" y="462">EventCard</text>
  <text class="tiny" x="340" y="480">事件卡片</text>
  <rect class="box box-gray" x="480" y="433" width="145" height="50"/>
  <text class="text" x="524" y="462">EChart</text>
  <text class="tiny" x="510" y="480">图表封装</text>
  <rect class="box box-gray" x="645" y="433" width="145" height="50"/>
  <text class="text" x="680" y="462">QAPanel</text>
  <text class="tiny" x="668" y="480">事件问答</text>
  <rect class="box box-gray" x="810" y="433" width="170" height="50"/>
  <text class="text" x="856" y="462">可视化组件</text>
  <text class="tiny" x="833" y="480">词云/情绪/比例条</text>
  <path class="line dash" d="M516 324 C516 370 388 370 388 433"/>
  <path class="line dash" d="M662 324 C662 370 553 370 553 433"/>
  <path class="line dash" d="M662 324 C662 370 718 370 718 433"/>

  <rect class="band" x="40" y="538" width="1120" height="118"/>
  <text class="layer-label" x="64" y="571">数据与服务层</text>
  <rect class="box box-orange" x="145" y="585" width="160" height="46"/>
  <text class="text" x="179" y="613">api/index.js</text>
  <text class="tiny" x="173" y="630">mock/backend 切换</text>
  <rect class="box box-orange" x="326" y="585" width="160" height="46"/>
  <text class="text" x="357" y="613">backendApi.js</text>
  <text class="tiny" x="359" y="630">真实 HTTP 请求</text>
  <rect class="box box-orange" x="507" y="585" width="160" height="46"/>
  <text class="text" x="545" y="613">mockApi.js</text>
  <text class="tiny" x="543" y="630">本地演示数据</text>
  <rect class="box box-orange" x="688" y="585" width="160" height="46"/>
  <text class="text" x="729" y="613">mappers.js</text>
  <text class="tiny" x="714" y="630">字段归一化</text>
  <rect class="box box-orange" x="869" y="585" width="160" height="46"/>
  <text class="text" x="912" y="613">utils</text>
  <text class="tiny" x="903" y="630">风险/导出工具</text>
  <path class="line" d="M552 483 C552 536 225 536 225 585"/>
  <path class="line" d="M718 483 C718 536 225 536 225 585"/>
  <path class="line" d="M305 608 H326"/>
  <path class="line" d="M305 608 C360 560 530 560 587 585"/>
  <path class="line" d="M486 608 H688"/>

  <rect class="box box-blue" x="170" y="685" width="190" height="46"/>
  <text class="text" x="207" y="713">FastAPI 后端</text>
  <text class="tiny" x="204" y="730">事件/用户/问答/PDF</text>
  <rect class="box box-green" x="506" y="685" width="190" height="46"/>
  <text class="text" x="547" y="713">mock 数据</text>
  <text class="tiny" x="531" y="730">events.js/mockAnalytics</text>
  <rect class="box box-purple" x="842" y="685" width="190" height="46"/>
  <text class="text" x="893" y="713">浏览器能力</text>
  <text class="tiny" x="872" y="730">localStorage/下载/打印</text>
  <path class="line" d="M406 631 C406 666 265 666 265 685"/>
  <path class="line" d="M587 631 V685"/>
  <path class="line" d="M949 631 V685"/>
</svg>
