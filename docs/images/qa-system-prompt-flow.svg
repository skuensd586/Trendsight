<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">大模型问答与 system prompt 流程图</title>
  <desc id="desc">展示用户问题从前端问答面板到后端事件上下文、system prompt、大模型调用和前端 Markdown 渲染的过程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#355f8d"/>
    </marker>
    <style>
      .bg { fill: #f7fafc; }
      .title { font: 700 30px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #172033; }
      .sub { font: 400 14px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #607083; }
      .box { fill: #fff; stroke: #c7d5e5; stroke-width: 1.4; rx: 14; }
      .front { fill: #eaf2ff; stroke: #8eb3db; }
      .back { fill: #e7f5ee; stroke: #80ba9c; }
      .prompt { fill: #fff4e8; stroke: #d99f64; }
      .model { fill: #f0edff; stroke: #aa9be1; }
      .store { fill: #f3f6f9; stroke: #b9c6d4; }
      .label { font: 700 17px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #1b2736; }
      .small { font: 400 13px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #526173; }
      .tiny { font: 400 12px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #647286; }
      .line { stroke: #355f8d; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 6 5; }
      .note { fill: #ffffff; stroke: #dbe5ee; stroke-width: 1; rx: 12; }
      .note-title { font: 700 14px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #344e69; }
      .note-text { font: 400 12.5px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #546374; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="52" y="58">大模型问答与 system prompt 流程图</text>
  <text class="sub" x="52" y="84">通过事件上下文和系统提示词约束模型，让回答更像舆情研判结论，而不是普通聊天。</text>

  <rect class="box front" x="72" y="158" width="190" height="72"/>
  <text class="label" x="124" y="188">用户提问</text>
  <text class="small" x="104" y="211">起因/风险/情绪/建议</text>

  <rect class="box front" x="330" y="158" width="210" height="72"/>
  <text class="label" x="397" y="188">QAPanel</text>
  <text class="small" x="362" y="211">维护消息、会话 ID、加载状态</text>

  <rect class="box back" x="608" y="158" width="220" height="72"/>
  <text class="label" x="661" y="188">问答接口</text>
  <text class="small" x="650" y="211">/api/events/:id/qa</text>

  <rect class="box store" x="894" y="158" width="220" height="72"/>
  <text class="label" x="958" y="188">会话存储</text>
  <text class="small" x="940" y="211">Conversation / Message</text>

  <path class="line" d="M262 194 H330"/>
  <path class="line" d="M540 194 H608"/>
  <path class="line dash" d="M828 194 H894"/>

  <rect class="box back" x="162" y="318" width="230" height="78"/>
  <text class="label" x="204" y="348">构建事件上下文</text>
  <text class="small" x="188" y="371">build_event_context()</text>
  <text class="tiny" x="190" y="389">标题、风险、趋势、关键词、平台</text>

  <rect class="box prompt" x="486" y="300" width="250" height="114"/>
  <text class="label" x="540" y="330">构建 system prompt</text>
  <text class="small" x="524" y="354">build_system_prompt()</text>
  <text class="tiny" x="514" y="376">角色：舆情分析助手</text>
  <text class="tiny" x="514" y="394">原则：基于资料、不编造、标注不确定</text>

  <rect class="box model" x="826" y="318" width="230" height="78"/>
  <text class="label" x="889" y="348">调用大模型</text>
  <text class="small" x="878" y="371">system + history + user</text>
  <text class="tiny" x="886" y="389">输出中文 Markdown</text>

  <path class="line" d="M718 230 C718 270 277 270 277 318"/>
  <path class="line" d="M392 357 H486"/>
  <path class="line" d="M736 357 H826"/>

  <rect class="box back" x="178" y="526" width="230" height="78"/>
  <text class="label" x="240" y="556">保存回答</text>
  <text class="small" x="224" y="579">写入 Message 记录</text>

  <rect class="box front" x="494" y="526" width="230" height="78"/>
  <text class="label" x="552" y="556">返回前端</text>
  <text class="small" x="530" y="579">conversation_id + answer</text>

  <rect class="box front" x="810" y="526" width="250" height="78"/>
  <text class="label" x="865" y="556">Markdown 渲染</text>
  <text class="small" x="844" y="579">标题/列表/加粗/分隔线</text>

  <path class="line" d="M941 396 C941 470 293 470 293 526"/>
  <path class="line" d="M408 565 H494"/>
  <path class="line" d="M724 565 H810"/>
  <path class="line dash" d="M894 204 C840 258 914 280 941 318"/>

  <rect class="note" x="70" y="652" width="1010" height="64"/>
  <text class="note-title" x="98" y="680">设计亮点</text>
  <text class="note-text" x="176" y="680">前端提供等待状态和结构化展示，后端用 system prompt 固定角色、依据和输出格式，两者配合提升回答质量和稳定性。</text>
  <text class="note-text" x="176" y="704">当模型或接口较慢时，用户仍能看到“正在整理回答”的反馈，避免误判为系统卡死。</text>
</svg>
