[alembic]
# path to migration scripts.
# Use forward slashes (/) also on windows to provide an OS agnostic path
script_location = alembic

# sys.path prepend
prepend_sys_path = .

# The sqlalchemy.url here is a placeholder; env.py overrides it at runtime.
# See env.py for the actual connection string from config.py.
sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
